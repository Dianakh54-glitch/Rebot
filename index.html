<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REBOTE | Elevated Sports Essentials</title>
    <style>
        /* LUXURY BRAND STYLING */
        :root {
            --brand-navy: #1a2a3a; /* The court blue from your photos */
            --brand-cream: #f9f7f2; /* The elegant bag beige */
            --brand-white: #ffffff;
            --text-main: #333333;
        }

        body {
            margin: 0;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: var(--brand-white);
            color: var(--text-main);
            line-height: 1.6;
        }

        /* NAVIGATION */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 5%;
            background: var(--brand-white);
            border-bottom: 1px solid #eee;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-weight: bold;
            font-size: 1.5rem;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-main);
            margin-left: 25px;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* HERO SECTION */
        .hero {
            height: 80vh;
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), 
                        url('https://images.unsplash.com/photo-1626248683404-586bc5418b76?q=80&w=2070&auto=format&fit=crop'); /* Placeholder: Replace with your court photo */
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
        }

        .hero h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            font-weight: 300;
            letter-spacing: 2px;
        }

        .hero p {
            font-size: 1.2rem;
            margin-bottom: 30px;
            font-style: italic;
        }

        .cta-btn {
            padding: 15px 40px;
            background-color: var(--brand-navy);
            color: white;
            text-decoration: none;
            border: none;
            letter-spacing: 2px;
            transition: 0.3s;
            cursor: pointer;
        }

        .cta-btn:hover {
            background-color: #000;
            transform: translateY(-2px);
        }

        /* PRODUCT GRID */
        .section-title {
            text-align: center;
            margin: 60px 0 30px;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            padding: 0 5%;
            margin-bottom: 80px;
        }

        .product-card {
            text-align: center;
            background: var(--brand-cream);
            padding-bottom: 20px;
            transition: 0.3s;
        }

        .product-card img {
            width: 100%;
            height: 400px;
            object-fit: cover;
        }

        .product-card h3 {
            margin: 15px 0 5px;
            font-weight: 400;
        }

        .price {
            font-weight: bold;
            color: var(--brand-navy);
        }

        /* FOOTER */
        footer {
            background: var(--brand-navy);
            color: white;
            padding: 50px 5%;
            text-align: center;
        }

        .footer-logo {
            font-size: 1.2rem;
            letter-spacing: 5px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <nav>
        <div class="nav-links">
            <a href="#">Shop</a>
            <a href="#">About</a>
        </div>
        <div class="logo">REBOTE</div>
        <div class="nav-links">
            <a href="#">Cart (0)</a>
        </div>
    </nav>

    <section class="hero">
        <h1>Elevated Sports Essentials</h1>
        <p>Handcrafted Padel Luxury. Est 2024.</p>
        <button class="cta-btn" onclick="scrollToProducts()">SHOP THE COLLECTION</button>
    </section>

    <h2 class="section-title" id="shop">The Signature Series</h2>
    
    <div class="product-grid">
        <div class="product-card">
            <div style="height:400px; background:#ddd; display:flex; align-items:center; justify-content:center;">[Bag Photo 1]</div>
            <h3>Onyx Quilted Tote</h3>
            <p class="price">$70.00</p>
            <button class="cta-btn" style="padding: 10px 20px; font-size: 0.8rem;">ADD TO CART</button>
        </div>

        <div class="product-card">
            <div style="height:400px; background:#e8e4db; display:flex; align-items:center; justify-content:center;">[Bag Photo 2]</div>
            <h3>Sandstone Quilted Tote</h3>
            <p class="price">$70.00</p>
            <button class="cta-btn" style="padding: 10px 20px; font-size: 0.8rem;">ADD TO CART</button>
        </div>
    </div>

    <footer>
        <div class="footer-logo">REBOTE</div>
        <p>Handcrafted Faux Leather Padel Bags</p>
        <p style="font-size: 0.8rem; opacity: 0.6;">© 2024 REBOTE SPORT. All Rights Reserved.</p>
    </footer>

    <script>
        function scrollToProducts() {
            document.getElementById('shop').scrollIntoView({ behavior: 'smooth' });
        }
    </script>
</body>
</html>
